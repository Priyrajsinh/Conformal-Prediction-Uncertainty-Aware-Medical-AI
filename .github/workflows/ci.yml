name: CI

# Single source of truth for "is this push-ready?".
# CLAUDE.md C46: `make ci` MUST run every step below in the same order with the
# same flags. Drift between this file and the Makefile target is a P0 bug.

on:
  push:
    branches: ["main", "dev", "feat/**", "fix/**", "chore/**", "test/**", "docs/**", "refactor/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -U pip wheel
          pip install -r requirements.txt -r requirements-dev.txt

      - name: black --check
        run: black --check src/ tests/

      - name: isort --check-only
        run: isort --check-only src/ tests/ --profile black

      - name: flake8
        run: flake8 src/ tests/

      - name: mypy
        run: mypy src/

      - name: bandit
        run: bandit -r src/ -ll -ii

      - name: radon (cyclomatic complexity)
        run: radon cc src/ -nc

      - name: interrogate (docstring coverage >= 80%)
        run: interrogate src/ --fail-under=80

      - name: pip-audit
        run: pip-audit -r requirements.txt

      - name: detect-secrets
        run: detect-secrets scan --baseline .secrets.baseline

      - name: Download UCI Heart Disease dataset
        run: |
          mkdir -p data/raw
          curl -fsSL -o data/raw/heart.csv \
            https://archive.ics.uci.edu/ml/machine-learning-databases/heart-disease/processed.cleveland.data

      - name: pytest (coverage >= 70%)
        run: pytest tests/ -v --tb=short --cov=src --cov-fail-under=70

      - name: Coverage regression test (rule B — Day 8+)
        if: hashFiles('reports/results.json') != ''
        run: pytest tests/test_coverage_regression.py -v
